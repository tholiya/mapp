org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Don't let Gradle auto-pick a stray JVM (the system java-21 is a JRE with no
# javac); the build JDK is supplied via JAVA_HOME / flutter --jdk-dir.
org.gradle.java.installations.auto-detect=false
# compileSdk 36 (from flutter.compileSdkVersion) is newer than AGP 8.7's tested
# range; silence the non-fatal warning (the android-36 platform is installed).
android.suppressUnsupportedCompileSdk=36
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
